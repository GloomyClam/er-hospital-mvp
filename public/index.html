<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" /> <!-- 메타는 브라우저에게 문서에 대한 정보를 알려주는 코드 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- 이 페이지를 어떻게 보여줄지,페이지를 기기 넓이에 맞게 맞춰서 보여줘라, 처음 화면을 100% 배율로 보여줘라-->
    <title>부산 수영구 응급실 병원</title>
    <link rel="stylesheet" href="/css/style.css" /> <!-- css 와의 연결 -->
  </head>
  <body>
    <header class="header">
      <h1>부산 수영구 응급실</h1>
      <p class="subtitle">실시간 가용 병상 정보 (공공 API)</p>
    </header>

    <main class="main">
      <section class="filter-panel" aria-labelledby="patient-status-title">
        <h2 id="patient-status-title">환자 정보</h2>
        <p class="patient-info-guide">환자 유형만 선택하면 바로 병원을 조회하고 연락할 수 있습니다. 아래 상세 정보는 선택 입력입니다.</p>
        <div class="patient-options">
          <label>
            <input type="radio" name="patient-status" value="general" checked />
            일반 응급
          </label>
          <label>
            <input type="radio" name="patient-status" value="severe" />
            중증 환자
          </label>
          <label>
            <input type="radio" name="patient-status" value="surgery" />
            수술 가능성 있음
          </label>
          <label>
            <input type="radio" name="patient-status" value="admission" />
            입원 가능성 있음
          </label>
        </div>

        <div class="patient-form" aria-label="선택 환자 정보">
          <label>
            주증상
            <input id="chief-complaint" name="chiefComplaint" type="text" placeholder="예: 흉통, 호흡곤란" />
          </label>
          <label>
            의식 상태
            <select id="mental-status" name="mentalStatus">
              <option value="">선택</option>
              <option value="alert">Alert</option>
              <option value="drowsy">Drowsy</option>
              <option value="stupor">Stupor</option>
              <option value="semiComa">Semi-coma</option>
              <option value="coma">Coma</option>
            </select>
          </label>
          <label>
            SBP / 수축기 혈압
            <input id="systolic-bp" name="systolicBp" type="number" inputmode="numeric" min="0" max="300" placeholder="mmHg" />
          </label>
          <label>
            DBP / 이완기 혈압
            <input id="diastolic-bp" name="diastolicBp" type="number" inputmode="numeric" min="0" max="200" placeholder="mmHg" />
          </label>
          <label>
            HR / 심박수
            <input id="heart-rate" name="heartRate" type="number" inputmode="numeric" min="0" max="250" placeholder="/min" />
          </label>
          <label>
            RR / 호흡수
            <input id="respiratory-rate" name="respiratoryRate" type="number" inputmode="numeric" min="0" max="80" placeholder="/min" />
          </label>
          <label>
            SpO₂ / 산소포화도
            <input id="spo2" name="spo2" type="number" inputmode="numeric" min="0" max="100" placeholder="%" />
          </label>
          <label>
            BT / 체온
            <input id="temperature" name="temperature" type="number" inputmode="decimal" min="0" max="45" step="0.1" placeholder="°C" />
          </label>
          <label>
            BST / 혈당
            <input id="blood-sugar" name="bloodSugar" type="number" inputmode="numeric" min="0" max="999" placeholder="mg/dL" />
          </label>
          <label>
            NRS / 통증 수치
            <input id="pain-score" name="painScore" type="number" inputmode="numeric" min="0" max="10" step="1" placeholder="0~10" />
          </label>
          <label class="patient-form__wide">
            현장 메모
            <textarea id="memo" name="memo" rows="3" placeholder="현장 상황, 처치 내용, 보호자 정보 등"></textarea>
          </label>
          <p id="patient-vital-error" class="patient-vital-error patient-form__wide" aria-live="polite" hidden></p>
        </div>
      </section>

      <p id="status" class="status" aria-live="polite">병원 정보를 불러오는 중…</p> <!-- aria-live="polite"는 스크린 리더 사용자(시각장애인)에게 적당한 타이밍에 알려주게끔 해주는 코드 -->

      <section class="history-panel" aria-labelledby="contact-history-title">
        <div class="history-header">
          <h2 id="contact-history-title">현재 이송 연락 타임라인</h2>
          <button id="new-transfer-button" type="button">새 이송 시작</button>
        </div>
        <div id="accepted-hospital" class="accepted-hospital" hidden></div>
        <ol id="contact-history-list" class="contact-history-list"></ol>
        <p id="empty-contact-history" class="empty-history">아직 기록된 연락 타임라인이 없습니다.</p>
      </section>

      <section class="hospital-section" aria-labelledby="available-title">
        <h2 id="available-title">조건을 만족하는 병원</h2>
        <ul id="hospital-list" class="hospital-list" hidden></ul> <!-- 이 코드는 히든으로 숨겨놓음 / 처음에는 병원 리스트를 안보여주고 서버에서 정보를 성공적으로 받아오면 화면에 표시(어떤방식으로 하는지 나중에 확인)-->
      </section>

      <section id="excluded-section" class="hospital-section excluded-section" aria-labelledby="excluded-title" hidden>
        <h2 id="excluded-title">제외된 병원</h2>
        <ul id="excluded-list" class="hospital-list"></ul>
      </section>
    </main>

    <div id="contact-modal" class="modal-backdrop" hidden>
      <section class="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
        <div class="modal-header">
          <h2 id="contact-modal-title">병원 연락</h2>
          <button id="contact-modal-close" type="button" aria-label="연락 창 닫기">닫기</button>
        </div>
        <div id="modal-patient-summary" class="modal-patient-summary"></div>
        <div id="modal-call-area" class="modal-call-area"></div>
        <div class="modal-result-area">
          <h3>연락 결과 기록</h3>
          <div class="modal-result-buttons">
            <button type="button" data-modal-result="accepted">수락</button>
            <button type="button" data-modal-result="rejected">거절</button>
            <button type="button" data-modal-result="noAnswer">응답 없음</button>
          </div>
          <label class="modal-rejection-reason">
            거절 사유
            <select id="modal-rejection-reason">
              <option value="">거절 사유 선택</option>
              <option value="병상 부족">병상 부족</option>
              <option value="전문의 부재">전문의 부재</option>
              <option value="수술실 불가">수술실 불가</option>
              <option value="중환자실 부족">중환자실 부족</option>
              <option value="장비 불가">장비 불가</option>
              <option value="기타">기타</option>
            </select>
          </label>
          <p id="modal-contact-error" class="contact-error" hidden></p>
        </div>
      </section>
    </div>

    <script src="/js/app.js"></script> <!-- 자바 스크립트 연결-->
  </body>
</html>
